<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="backgroundFill" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24272D" />
      <stop offset="1" stop-color="#1D2026" />
    </linearGradient>
    <linearGradient id="cubeStroke" x1="220" y1="178" x2="804" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31D7FF" />
      <stop offset="0.55" stop-color="#7C5CFF" />
      <stop offset="1" stop-color="#B45CFF" />
