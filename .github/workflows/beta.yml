name: Beta Release

on:
  push:
    tags:
      - 'v*.*.*-beta*'

permissions:
  contents: write

jobs:
  beta:
    name: Build and publish beta
    runs-on: windows-latest

    env:
      CHANNEL: beta
      PUBLISH_DIR: publish/BlockHelm-Launcher-win-x64-fdd-single
      ASSET_PATH: publish/BlockHelm-Launcher-win-x64-fdd-single/BlockHelm_Launcher_x64.exe
      MANIFEST_PATH: update/latest.template.json
      GITEE_OWNER: zqq-699
      GITEE_REPO: BlockHelm-Launcher
      GITEE_BRANCH: update-manifests
      GITHUB_MANIFEST_BRANCH: update-manifests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve beta metadata
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-beta\.(?<beta>\d+)$') {
            throw "Beta tag must match vX.Y.Z-beta.N. Actual tag: $tag"
          }

          $versionName = $tag.Substring(1)
          $betaNumber = [int]$Matches.beta
          if ($betaNumber -lt 1 -or $betaNumber -gt 98) {
            throw "Beta number must be between 1 and 98. Actual beta number: $betaNumber"
          }

          $versionCode = ([int]$Matches.major * 1000000) + ([int]$Matches.minor * 10000) + ([int]$Matches.patch * 100) + $betaNumber
          $notesPath = "update/$($env:CHANNEL)/notes/$versionName.md"

          if (-not (Test-Path $notesPath)) {
            throw "Beta release notes file is missing: $notesPath"
          }

          $releaseNotes = Get-Content -Raw -Encoding UTF8 $notesPath
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            throw "Beta release notes file is empty: $notesPath"
          }

          [xml]$project = Get-Content "Launcher.App/Launcher.App.csproj"
          $properties = $project.Project.PropertyGroup | Where-Object { $_.InformationalVersion } | Select-Object -First 1
          if ($properties.InformationalVersion -ne $versionName) {
            throw "InformationalVersion '$($properties.InformationalVersion)' does not match tag version '$versionName'."
          }

          if ($properties.LauncherBuildChannel -ne $env:CHANNEL) {
            throw "LauncherBuildChannel '$($properties.LauncherBuildChannel)' does not match workflow channel '$($env:CHANNEL)'."
          }

          if ([int]$properties.LauncherVersionCode -ne $versionCode) {
            throw "LauncherVersionCode '$($properties.LauncherVersionCode)' does not match computed versionCode '$versionCode'."
          }

          "VERSION_NAME=$versionName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION_CODE=$versionCode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NOTES_PATH=$notesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GENERATED_MANIFEST_PATH=$($env:PUBLISH_DIR)/latest.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Launcher.sln

      - name: Test
        run: dotnet test Launcher.sln --no-restore

      - name: Verify beta manifest template
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -Encoding UTF8 $env:MANIFEST_PATH | ConvertFrom-Json

          if ($manifest.schemaVersion -ne 1) {
            throw "Unsupported update manifest schemaVersion: $($manifest.schemaVersion)"
          }

          if ($manifest.appId -ne "BlockHelm-Launcher") {
            throw "Unexpected update manifest appId: $($manifest.appId)"
          }

          $urls = @($manifest.assets[0].urls)
          if ($urls.Count -ne 2) {
            throw "Manifest template must define exactly two download URL slots."
          }

          if ($urls[0].name -ne "gitee" -or [int]$urls[0].priority -ne 1) {
            throw "Manifest template first download URL must be gitee with priority 1."
          }

          if ($urls[1].name -ne "github" -or [int]$urls[1].priority -ne 2) {
            throw "Manifest template second download URL must be github with priority 2."
          }

      - name: Clean publish output
        shell: pwsh
        run: |
          if (Test-Path $env:PUBLISH_DIR) {
            Remove-Item $env:PUBLISH_DIR -Recurse -Force
          }

      - name: Prepare CurseForge API key
        shell: pwsh
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CURSEFORGE_API_KEY)) {
            throw "Repository secret CURSEFORGE_API_KEY is not configured. Configure it before publishing a beta release."
          }

          New-Item -ItemType Directory -Force ".local-secrets" | Out-Null
          Set-Content -Path ".local-secrets/curseforge.key" -Value $env:CURSEFORGE_API_KEY.Trim() -NoNewline -Encoding utf8

      - name: Publish win-x64 single file
        run: dotnet publish Launcher.App/Launcher.App.csproj -c Release -p:PublishProfile=WinX64FrameworkDependentSingleFile

      - name: Prepare beta artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path $env:ASSET_PATH)) {
            throw "Expected beta asset was not created: $($env:ASSET_PATH)"
          }

          $assetName = Split-Path $env:ASSET_PATH -Leaf
          $fileInfo = Get-Item $env:ASSET_PATH
          $hash = Get-FileHash -Algorithm SHA256 $env:ASSET_PATH
          $sha256 = $hash.Hash.ToLowerInvariant()
          $githubDownloadUrl = "https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/$($env:GITHUB_REF_NAME)/$assetName"
          $encodedTag = [uri]::EscapeDataString($env:GITHUB_REF_NAME)
          $encodedAssetName = [uri]::EscapeDataString($assetName)
          $giteeFallbackDownloadUrl = "https://gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/releases/download/$encodedTag/$encodedAssetName"
          $releaseTitle = "BlockHelm Launcher $($env:VERSION_NAME) Beta"

          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_SIZE=$($fileInfo.Length)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_SHA256=$sha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GITHUB_DOWNLOAD_URL=$githubDownloadUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GITEE_FALLBACK_DOWNLOAD_URL=$giteeFallbackDownloadUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=$releaseTitle" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Reserve Gitee beta release tag
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw "Repository secret GITEE_TOKEN is not configured. Configure it before publishing a beta release."
          }

          $mirrorDirectory = Join-Path $env:RUNNER_TEMP "gitee-update-mirror"
          if (Test-Path $mirrorDirectory) {
            Remove-Item $mirrorDirectory -Recurse -Force
          }

          New-Item -ItemType Directory -Force $mirrorDirectory | Out-Null
          Push-Location $mirrorDirectory
          try {
            git init
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
            $remoteUrl = "https://oauth2:$encodedToken@gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO).git"
            git remote add origin $remoteUrl

            function Initialize-ManifestBranch {
              git checkout --orphan $env:GITEE_BRANCH
              New-Item -ItemType Directory -Force "update" | Out-Null
              New-Item -ItemType File -Force "update/.gitkeep" | Out-Null
              git add update
              git commit -m "Initialize update manifests [skip ci]"
              git push origin HEAD:$($env:GITEE_BRANCH)
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to initialize Gitee manifest branch '$($env:GITEE_BRANCH)'."
              }
            }

            $existingTag = & git ls-remote --tags origin $env:GITHUB_REF_NAME
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query Gitee tags."
            }

            if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
              throw "Gitee tag '$($env:GITHUB_REF_NAME)' already exists."
            }

            $branchRef = & git ls-remote --heads origin $env:GITEE_BRANCH
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query Gitee branch '$($env:GITEE_BRANCH)'."
            }

            if ([string]::IsNullOrWhiteSpace($branchRef)) {
              Write-Host "Gitee manifest branch '$($env:GITEE_BRANCH)' does not exist. Initializing it from the manifest template."
              Initialize-ManifestBranch
            }

            git fetch origin $env:GITEE_BRANCH
            git checkout -B $env:GITEE_BRANCH FETCH_HEAD
            git tag $env:GITHUB_REF_NAME
            git push origin $env:GITHUB_REF_NAME
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to push Gitee release tag '$($env:GITHUB_REF_NAME)'."
            }

            "GITEE_TAG_CREATED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } finally {
            Pop-Location
          }

      - name: Create Gitee beta release
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw "Repository secret GITEE_TOKEN is not configured. Configure it before publishing a beta release."
          }

          $releaseNotes = Get-Content -Raw -Encoding UTF8 $env:NOTES_PATH
          $releaseUri = "https://gitee.com/api/v5/repos/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/releases"

          Write-Host "Creating Gitee beta release. Tag=$($env:GITHUB_REF_NAME)"
          $release = Invoke-RestMethod -Method Post -Uri $releaseUri -TimeoutSec 60 -Body @{
            access_token = $env:GITEE_TOKEN
            tag_name = $env:GITHUB_REF_NAME
            target_commitish = $env:GITEE_BRANCH
            name = $env:RELEASE_TITLE
            body = $releaseNotes
            prerelease = "true"
          }

          if ($null -eq $release.id) {
            throw "Gitee release response did not include an id."
          }

          Write-Host "Gitee beta release created. ReleaseId=$($release.id)"
          "GITEE_RELEASE_ID=$($release.id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GITEE_RELEASE_CREATED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
          $uploadUri = "https://gitee.com/api/v5/repos/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/releases/$($release.id)/attach_files?access_token=$encodedToken"

          function Add-UrlCandidates {
            param(
              [object]$Value,
              [System.Collections.Generic.List[string]]$Urls
            )

            if ($null -eq $Value) {
              return
            }

            if ($Value -is [string]) {
              if ($Value -match '^https?://') {
                $Urls.Add($Value)
              }

              return
            }

            if ($Value -is [ValueType]) {
              return
            }

            if ($Value -is [System.Collections.IDictionary]) {
              foreach ($item in $Value.Values) {
                Add-UrlCandidates -Value $item -Urls $Urls
              }

              return
            }

            if ($Value -is [System.Collections.IEnumerable]) {
              foreach ($item in $Value) {
                Add-UrlCandidates -Value $item -Urls $Urls
              }

              return
            }

            foreach ($property in $Value.PSObject.Properties) {
              Add-UrlCandidates -Value $property.Value -Urls $Urls
            }
          }

          function Test-DownloadUrl {
            param([string]$Url)

            try {
              $headResponse = Invoke-WebRequest -Method Head -Uri $Url -MaximumRedirection 5 -TimeoutSec 60 -UseBasicParsing
              if ([int]$headResponse.StatusCode -ge 200 -and [int]$headResponse.StatusCode -lt 400) {
                return $true
              }
            } catch {
              Write-Host "Gitee download URL HEAD validation failed. Url=$Url Error=$($_.Exception.Message)"
            }

            try {
              $getResponse = Invoke-WebRequest -Method Get -Uri $Url -Headers @{ Range = "bytes=0-0" } -MaximumRedirection 5 -TimeoutSec 60 -UseBasicParsing
              return [int]$getResponse.StatusCode -ge 200 -and [int]$getResponse.StatusCode -lt 400
            } catch {
              Write-Host "Gitee download URL GET validation failed. Url=$Url Error=$($_.Exception.Message)"
              return $false
            }
          }

          function Resolve-GiteeDownloadUrl {
            param(
              [string]$ResponseText,
              [string]$FileName,
              [string]$FallbackUrl
            )

            $urls = [System.Collections.Generic.List[string]]::new()
            if (-not [string]::IsNullOrWhiteSpace($ResponseText)) {
              try {
                $responseJson = $ResponseText | ConvertFrom-Json
                Add-UrlCandidates -Value $responseJson -Urls $urls
              } catch {
                Write-Host "Gitee upload response was not valid JSON while resolving download URL: $($_.Exception.Message)"
              }
            }

            $matchingUrls = $urls | Where-Object { $_ -like "*$FileName*" -and $_ -match '/releases/download/' }
            $candidates = @($matchingUrls) + @($urls) + @($FallbackUrl) |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique

            foreach ($candidate in $candidates) {
              Write-Host "Validating Gitee download URL candidate: $candidate"
              if (Test-DownloadUrl -Url $candidate) {
                return $candidate
              }
            }

            throw "Could not resolve a valid Gitee download URL for '$FileName'."
          }

          $assetFullName = (Get-Item $env:ASSET_PATH).FullName
          foreach ($filePath in @($env:ASSET_PATH)) {
            $file = Get-Item $filePath
            Write-Host "Uploading Gitee release attachment. File=$($file.Name) Size=$($file.Length)"
            $responsePath = Join-Path $env:RUNNER_TEMP "gitee-upload-$($file.Name).json"
            $statusPath = Join-Path $env:RUNNER_TEMP "gitee-upload-$($file.Name).status"
            $curlArgs = @(
              "--show-error",
              "--location",
              "--connect-timeout", "30",
              "--max-time", "600",
              "--retry", "2",
              "--retry-delay", "5",
              "--request", "POST",
              "--output", $responsePath,
              "--write-out", "%{http_code}",
              $uploadUri,
              "--form", "file=@$($file.FullName)"
            )

            & curl.exe @curlArgs | Set-Content -Path $statusPath -Encoding ascii
            $curlExitCode = $LASTEXITCODE
            $httpStatus = if (Test-Path $statusPath) { (Get-Content -Raw $statusPath).Trim() } else { "" }
            $responseText = if (Test-Path $responsePath) { Get-Content -Raw -Encoding UTF8 $responsePath } else { "" }

            Write-Host "Gitee upload completed. File=$($file.Name) CurlExitCode=$curlExitCode HttpStatus=$httpStatus"
            if ($curlExitCode -ne 0 -or $httpStatus -notmatch '^2\d\d$') {
              if (-not [string]::IsNullOrWhiteSpace($responseText)) {
                Write-Host "Gitee upload response body:"
                Write-Host ($responseText.Substring(0, [Math]::Min($responseText.Length, 4000)))
              }

              throw "Failed to upload Gitee release attachment '$($file.Name)'. curl exit code: $curlExitCode HTTP status: $httpStatus"
            }

            Write-Host "Uploaded Gitee release attachment. File=$($file.Name)"
            if ($file.FullName -eq $assetFullName) {
              $giteeDownloadUrl = Resolve-GiteeDownloadUrl -ResponseText $responseText -FileName $file.Name -FallbackUrl $env:GITEE_FALLBACK_DOWNLOAD_URL
              Write-Host "Resolved Gitee download URL for launcher asset: $giteeDownloadUrl"
              "GITEE_DOWNLOAD_URL=$giteeDownloadUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Generate final beta manifest
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_DOWNLOAD_URL)) {
            throw "Gitee download URL was not resolved from the uploaded launcher asset."
          }

          $releaseNotes = Get-Content -Raw -Encoding UTF8 $env:NOTES_PATH
          $manifest = Get-Content -Raw -Encoding UTF8 $env:MANIFEST_PATH | ConvertFrom-Json
          $manifest.channel = $env:CHANNEL
          $manifest.versionName = $env:VERSION_NAME
          $manifest.versionCode = [int]$env:VERSION_CODE
          $manifest.publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest.releaseNotes = $releaseNotes.Trim()

          $asset = $manifest.assets[0]
          $asset.fileName = $env:ASSET_NAME
          $asset.size = [int64]$env:ASSET_SIZE
          $asset.sha256 = $env:ASSET_SHA256
          $asset.urls = @(
            [pscustomobject]@{
              name = "gitee"
              url = $env:GITEE_DOWNLOAD_URL
              priority = 1
            },
            [pscustomobject]@{
              name = "github"
              url = $env:GITHUB_DOWNLOAD_URL
              priority = 2
            }
          )

          $manifestJson = ($manifest | ConvertTo-Json -Depth 20).Replace("`r`n", "`n")
          [IO.File]::WriteAllText($env:GENERATED_MANIFEST_PATH, $manifestJson, [Text.UTF8Encoding]::new($false))

      - name: Upload final beta manifest to Gitee release
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw "Repository secret GITEE_TOKEN is not configured. Configure it before publishing a beta release."
          }

          if ([string]::IsNullOrWhiteSpace($env:GITEE_RELEASE_ID)) {
            throw "Gitee release id is missing."
          }

          $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
          $uploadUri = "https://gitee.com/api/v5/repos/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/releases/$($env:GITEE_RELEASE_ID)/attach_files?access_token=$encodedToken"
          $file = Get-Item $env:GENERATED_MANIFEST_PATH
          Write-Host "Uploading manifest artifact to Gitee release. File=$($file.Name) Size=$($file.Length)"
          $responsePath = Join-Path $env:RUNNER_TEMP "gitee-upload-$($file.Name).json"
          $statusPath = Join-Path $env:RUNNER_TEMP "gitee-upload-$($file.Name).status"
          $curlArgs = @(
            "--show-error", "--location", "--connect-timeout", "30", "--max-time", "600",
            "--retry", "2", "--retry-delay", "5", "--request", "POST",
            "--output", $responsePath, "--write-out", "%{http_code}", $uploadUri,
            "--form", "file=@$($file.FullName)"
          )
          & curl.exe @curlArgs | Set-Content -Path $statusPath -Encoding ascii
          $curlExitCode = $LASTEXITCODE
          $httpStatus = if (Test-Path $statusPath) { (Get-Content -Raw $statusPath).Trim() } else { "" }
          if ($curlExitCode -ne 0 -or $httpStatus -notmatch '^2\d\d$') {
            throw "Failed to upload manifest artifact to Gitee release. File=$($file.Name) curl=$curlExitCode HTTP=$httpStatus"
          }

      - name: Create GitHub beta release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME $env:ASSET_PATH $env:GENERATED_MANIFEST_PATH --title $env:RELEASE_TITLE --notes-file $env:NOTES_PATH --prerelease --latest=false
          "GITHUB_RELEASE_CREATED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync Gitee update repository and tag
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw "Repository secret GITEE_TOKEN is not configured. Configure it before publishing a beta release."
          }

          $workspace = $env:GITHUB_WORKSPACE
          $generatedManifestPath = Join-Path $workspace $env:GENERATED_MANIFEST_PATH
          if (-not (Test-Path $generatedManifestPath)) {
            throw "Generated manifest was not found: $generatedManifestPath"
          }

          $mirrorDirectory = Join-Path $env:RUNNER_TEMP "gitee-update-mirror-final"
          if (Test-Path $mirrorDirectory) {
            Remove-Item $mirrorDirectory -Recurse -Force
          }

          New-Item -ItemType Directory -Force $mirrorDirectory | Out-Null
          Push-Location $mirrorDirectory
          $branchBase = $null
          try {
            git init
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
            $remoteUrl = "https://oauth2:$encodedToken@gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO).git"
            git remote add origin $remoteUrl

            $branchRef = & git ls-remote --heads origin $env:GITEE_BRANCH
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query Gitee branch '$($env:GITEE_BRANCH)'."
            }

            if ([string]::IsNullOrWhiteSpace($branchRef)) {
              git checkout --orphan $env:GITEE_BRANCH
            } else {
              $branchBase = ($branchRef -split "\s+")[0]
              "GITEE_BRANCH_BASE=$branchBase" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              git fetch origin $env:GITEE_BRANCH
              git checkout -B $env:GITEE_BRANCH FETCH_HEAD
            }

            New-Item -ItemType Directory -Force "update/release" | Out-Null
            New-Item -ItemType Directory -Force "update/beta" | Out-Null
            Copy-Item $generatedManifestPath "update/$($env:CHANNEL)/latest.json" -Force
            Remove-Item "update/release/latest.json.sig", "update/beta/latest.json.sig" -Force -ErrorAction SilentlyContinue

            git add update
            if (git diff --cached --quiet) {
              Write-Host "No Gitee manifest changes to commit."
            } else {
              git commit -m "Update $($env:CHANNEL) manifest for $($env:VERSION_NAME) [skip ci]"
            }

            git push origin HEAD:$($env:GITEE_BRANCH)
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to push Gitee manifest branch '$($env:GITEE_BRANCH)'."
            }

            git tag -f $env:GITHUB_REF_NAME
            git push --force origin refs/tags/$($env:GITHUB_REF_NAME)
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to move Gitee release tag '$($env:GITHUB_REF_NAME)' to the final manifest commit."
            }

            $manifestCommit = (git rev-parse HEAD).Trim()
            "GITEE_MANIFEST_COMMIT=$manifestCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "GITEE_MANIFEST_SYNCED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } catch {
            Write-Host "Rolling back Gitee manifest sync after failure."
            if (-not [string]::IsNullOrWhiteSpace($branchBase)) {
              git push --force-with-lease origin "$branchBase`:refs/heads/$($env:GITEE_BRANCH)"
            }

            throw
          } finally {
            Pop-Location
          }

      - name: Sync GitHub beta manifest branch
        shell: pwsh
        run: |
          $manifestSourcePath = Join-Path $env:RUNNER_TEMP "latest.json"
          Copy-Item $env:GENERATED_MANIFEST_PATH $manifestSourcePath -Force
          $targetPath = "update/$($env:CHANNEL)/latest.json"
          $branch = $env:GITHUB_MANIFEST_BRANCH

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $branchRef = & git ls-remote --heads origin $branch
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query GitHub manifest branch '$branch'."
          }

          if ([string]::IsNullOrWhiteSpace($branchRef)) {
            "GITHUB_MANIFEST_BRANCH_CREATED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            git checkout --orphan $branch
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
            git rm -r --cached . --ignore-unmatch
          } else {
            $githubBranchBase = ($branchRef -split "\s+")[0]
            "GITHUB_MANIFEST_BRANCH_BASE=$githubBranchBase" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            git fetch origin $branch
            git checkout -B $branch FETCH_HEAD
          }

          New-Item -ItemType Directory -Force "update/release" | Out-Null
          New-Item -ItemType Directory -Force "update/beta" | Out-Null
          Copy-Item $manifestSourcePath $targetPath -Force
          Remove-Item "update/release/latest.json.sig", "update/beta/latest.json.sig" -Force -ErrorAction SilentlyContinue
          git add update

          if (git diff --cached --quiet) {
            Write-Host "No manifest changes to commit."
          } else {
            git commit -m "Update $($env:CHANNEL) manifest for $($env:VERSION_NAME) [skip ci]"
            git push origin HEAD:$branch
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to push GitHub manifest update to '$branch'."
            }
            "GITHUB_MANIFEST_SYNCED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          $manifestCommit = (git rev-parse HEAD).Trim()
          "GITHUB_MANIFEST_COMMIT=$manifestCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify published manifests are byte-identical
        shell: pwsh
        run: |
          if ($env:GITHUB_MANIFEST_COMMIT -notmatch '^[0-9a-f]{40}$' -or $env:GITEE_MANIFEST_COMMIT -notmatch '^[0-9a-f]{40}$') {
            throw "A synchronized manifest commit id is missing or invalid."
          }
          $githubBase = "https://raw.githubusercontent.com/$($env:GITHUB_REPOSITORY)/$($env:GITHUB_MANIFEST_COMMIT)/update/$($env:CHANNEL)"
          $giteeBase = "https://gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/raw/$($env:GITEE_MANIFEST_COMMIT)/update/$($env:CHANNEL)"
          function Test-ExactBytes([string]$expectedPath, [string]$actualPath) {
            $expected = [IO.File]::ReadAllBytes($expectedPath)
            $actual = [IO.File]::ReadAllBytes($actualPath)
            if ($expected.Length -ne $actual.Length) { return $false }
            for ($index = 0; $index -lt $expected.Length; $index++) {
              if ($expected[$index] -ne $actual[$index]) { return $false }
            }
            return $true
          }
          function Receive-VerifiedCopy([string]$provider, [string]$name, [string]$url, [string]$expectedPath, [string]$actualPath) {
            for ($attempt = 1; $attempt -le 6; $attempt++) {
              $nonce = [Guid]::NewGuid().ToString("N")
              try {
                Invoke-WebRequest -Uri "$url`?cache=$nonce" -Headers @{ "Cache-Control" = "no-cache" } -OutFile $actualPath -TimeoutSec 60
                if (Test-ExactBytes $expectedPath $actualPath) { return }
                $expectedLength = (Get-Item $expectedPath).Length
                $actualLength = (Get-Item $actualPath).Length
                Write-Host "$provider $name differs on attempt $attempt. ExpectedLength=$expectedLength ActualLength=$actualLength"
              } catch {
                Write-Host "$provider $name readback failed on attempt ${attempt}: $($_.Exception.Message)"
              }
              if ($attempt -lt 6) { Start-Sleep -Seconds 10 }
            }
            throw "$provider $name did not become byte-identical after 6 attempts."
          }
          $localPath = Join-Path $env:RUNNER_TEMP "latest.json"
          $githubPath = Join-Path $env:RUNNER_TEMP "github-latest.json"
          $giteePath = Join-Path $env:RUNNER_TEMP "gitee-latest.json"
          Receive-VerifiedCopy "GitHub" "latest.json" "$githubBase/latest.json" $localPath $githubPath
          Receive-VerifiedCopy "Gitee" "latest.json" "$giteeBase/latest.json" $localPath $giteePath

      - name: Cleanup failed beta publish
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if ($env:GITHUB_RELEASE_CREATED -eq "true") {
            Write-Host "Deleting GitHub release created by failed workflow. Tag=$($env:GITHUB_REF_NAME)"
            gh release delete $env:GITHUB_REF_NAME --yes
          }

          if ($env:GITHUB_MANIFEST_SYNCED -eq "true") {
            if ($env:GITHUB_MANIFEST_BRANCH_CREATED -eq "true") {
              git push origin ":refs/heads/$($env:GITHUB_MANIFEST_BRANCH)"
            } elseif (-not [string]::IsNullOrWhiteSpace($env:GITHUB_MANIFEST_BRANCH_BASE)) {
              git push --force-with-lease origin "$($env:GITHUB_MANIFEST_BRANCH_BASE):refs/heads/$($env:GITHUB_MANIFEST_BRANCH)"
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:GITEE_TOKEN) -and -not [string]::IsNullOrWhiteSpace($env:GITEE_RELEASE_ID)) {
            Write-Host "Deleting Gitee release created by failed workflow. ReleaseId=$($env:GITEE_RELEASE_ID)"
            $deleteUri = "https://gitee.com/api/v5/repos/$($env:GITEE_OWNER)/$($env:GITEE_REPO)/releases/$($env:GITEE_RELEASE_ID)"
            try {
              Invoke-RestMethod -Method Delete -Uri $deleteUri -TimeoutSec 60 -Body @{ access_token = $env:GITEE_TOKEN } | Out-Null
            } catch {
              Write-Host "Failed to delete Gitee release: $($_.Exception.Message)"
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:GITEE_TOKEN) -and $env:GITEE_MANIFEST_SYNCED -eq "true" -and -not [string]::IsNullOrWhiteSpace($env:GITEE_BRANCH_BASE)) {
            Write-Host "Rolling back Gitee manifest branch to $($env:GITEE_BRANCH_BASE)."
            $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
            $remoteUrl = "https://oauth2:$encodedToken@gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO).git"
            git init "$env:RUNNER_TEMP/gitee-cleanup"
            Push-Location "$env:RUNNER_TEMP/gitee-cleanup"
            try {
              git remote add origin $remoteUrl
              git push --force-with-lease origin "$($env:GITEE_BRANCH_BASE):refs/heads/$($env:GITEE_BRANCH)"
            } finally {
              Pop-Location
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:GITEE_TOKEN) -and $env:GITEE_TAG_CREATED -eq "true") {
            Write-Host "Deleting Gitee tag created by failed workflow. Tag=$($env:GITHUB_REF_NAME)"
            $encodedToken = [uri]::EscapeDataString($env:GITEE_TOKEN)
            $remoteUrl = "https://oauth2:$encodedToken@gitee.com/$($env:GITEE_OWNER)/$($env:GITEE_REPO).git"
            git init "$env:RUNNER_TEMP/gitee-tag-cleanup"
            Push-Location "$env:RUNNER_TEMP/gitee-tag-cleanup"
            try {
              git remote add origin $remoteUrl
              git push origin ":refs/tags/$($env:GITHUB_REF_NAME)"
            } finally {
              Pop-Location
            }
          }
